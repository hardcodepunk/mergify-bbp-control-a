name: bbp production deployment proof

on:
  push:
    branches:
      - main
    paths:
      - "proof-impact/production.txt"

permissions:
  contents: read
  deployments: write

jobs:
  create-controlled-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Create controlled deployment status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          payload=$(jq -n \
            --arg ref "$GITHUB_SHA" \
            --arg description "Controlled proof that a merge to main triggered a deployment workflow." \
            '{ref: $ref, environment: "bbp-controlled-production", auto_merge: false, required_contexts: [], description: $description}')
          deployment=$(curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/deployments" \
            -d "$payload")
          deployment_id=$(printf '%s' "$deployment" | jq -r '.id')
          test "$deployment_id" != "null"
          status_payload=$(jq -n \
            --arg description "Controlled deployment proof completed." \
            '{state: "success", environment: "bbp-controlled-production", description: $description, log_url: env.GITHUB_SERVER_URL + "/" + env.GITHUB_REPOSITORY + "/actions/runs/" + env.GITHUB_RUN_ID}')
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
            -d "$status_payload"
