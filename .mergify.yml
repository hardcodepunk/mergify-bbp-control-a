pull_request_rules:
  - name: controlled self-referential check count observation
    conditions:
      - "#check-success >= 1"
    actions:
      comment:
        message: |
          controlled self-referential check-count rule fired for PR #{{number}} by {{author}}

  - name: controlled self-referential status count observation
    conditions:
      - "#status-success >= 1"
    actions:
      comment:
        message: |
          controlled self-referential status-count rule fired for PR #{{number}} by {{author}}
